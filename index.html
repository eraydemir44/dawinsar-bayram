<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAWİNSAR - Hayırlı Bayramlar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Canlı Arka Plan */
        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            filter: blur(50px);
            opacity: 0.6;
            animation: float 20s infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: #ff0844;
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            background: #ff4567;
            border-radius: 50%;
            bottom: -150px;
            right: -100px;
            animation-delay: 5s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: #ff6b6b;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Konfeti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall 10s linear infinite;
            z-index: 1;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Ana Container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        /* Logo */
        .logo {
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 800;
            color: #fff;
            letter-spacing: 8px;
            margin-bottom: 40px;
            text-transform: uppercase;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(255, 8, 68, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(255, 8, 68, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255, 8, 68, 0.5); }
        }

        /* Ana Başlık */
        .main-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-word {
            display: block;
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            line-height: 1;
            text-shadow: 
                0 0 20px rgba(255, 8, 68, 0.5),
                0 0 40px rgba(255, 8, 68, 0.3),
                0 0 60px rgba(255, 8, 68, 0.2);
            animation: slideIn 1s ease-out forwards;
            opacity: 0;
            transform: translateY(50px);
        }

        .title-word:nth-child(1) { animation-delay: 0.2s; }
        .title-word:nth-child(2) { 
            animation-delay: 0.4s; 
            background: linear-gradient(to right, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Alt Metin */
        .subtitle {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: #fff;
            text-align: center;
            max-width: 600px;
            line-height: 1.8;
            margin-top: 20px;
            font-weight: 300;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            opacity: 0;
            animation: fadeIn 1s ease 0.6s forwards;
        }

        .subtitle-line {
            display: block;
            margin: 5px 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* CTA Butonu */
        .cta-button {
            margin-top: 50px;
            padding: 20px 50px;
            background: #fff;
            color: #ff0844;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 1s ease 0.8s forwards, bounce 2s infinite 1s;
            position: relative;
            overflow: hidden;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        .cta-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: modalPop 0.5s ease;
            position: relative;
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #ff0844;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: #d9043d;
        }

        .modal-title {
            font-size: 2rem;
            color: #ff0844;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .modal-subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff0844;
            box-shadow: 0 0 0 3px rgba(255, 8, 68, 0.1);
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff0844 0%, #ff4567 100%);
            border: none;
            border-radius: 15px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 8, 68, 0.4);
        }

        /* Başarı Mesajı */
        .success-message {
            display: none;
            text-align: center;
            padding: 40px 20px;
            animation: successPop 0.5s ease;
        }

        @keyframes successPop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff0844, #ff4567);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            color: #fff;
            animation: checkBounce 1s infinite;
        }

        @keyframes checkBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .success-text {
            color: #333;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .success-subtext {
            color: #666;
            margin-top: 10px;
        }

        /* Admin */
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.8rem;
            z-index: 100;
        }

        .admin-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f8f9fa;
            z-index: 2000;
            overflow-y: auto;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-header {
            background: linear-gradient(135deg, #ff0844 0%, #ff4567 100%);
            color: #fff;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .admin-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .messages-container {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .message-card {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #ff0844;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            align-items: center;
        }

        .message-name {
            color: #ff0844;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .message-date {
            color: #999;
            font-size: 0.85rem;
        }

        .message-text {
            color: #555;
            line-height: 1.6;
        }

        .delete-btn {
            background: #ff0844;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #d9043d;
            transform: scale(1.05);
        }

        .clear-all-btn {
            background: #333;
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: 600;
            width: 100%;
        }

        .admin-login {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1500;
            justify-content: center;
            align-items: center;
        }

        .admin-login.active {
            display: flex;
        }

        .login-box {
            background: #fff;
            padding: 50px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        .login-title {
            color: #ff0844;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .modal-content {
                padding: 30px 20px;
            }
            
            .shape {
                filter: blur(30px);
            }
        }
    </style>
</head>
<body>
    <!-- Arka Plan Şekilleri -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Konfeti -->
    <div id="confetti-container"></div>

    <!-- Ana İçerik -->
    <div class="container">
        <div class="logo">DAWİNSAR</div>
        
        <div class="main-title">
            <span class="title-word">Hayırlı</span>
            <span class="title-word">Bayramlar</span>
        </div>

        <div class="subtitle">
            <span class="subtitle-line">Ramazan Bayramınız mübarek olsun!</span>
            <span class="subtitle-line">Sevdiklerinizle birlikte sağlıklı,</span>
            <span class="subtitle-line">huzurlu ve bereketli bayramlar dileriz.</span>
        </div>

        <button class="cta-button" onclick="openModal()">🎉 Teşekkür Et</button>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            
            <div id="formContainer">
                <div class="modal-title">Görüşleriniz</div>
                <div class="modal-subtitle">Bayram mesajınızı bırakın, sizinle iletişime geçelim</div>

                <form onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label class="form-label">İsim Soyisim</label>
                        <input type="text" class="form-input" id="fullName" placeholder="Adınızı girin" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Mesajınız</label>
                        <textarea class="form-input form-textarea" id="message" placeholder="Bayram mesajınızı yazın..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Gönder</button>
                </form>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✓</div>
                <div class="success-text">Teşekkürler!</div>
                <div class="success-subtext">Mesajınız başarıyla alındı.</div>
            </div>
        </div>
    </div>

    <!-- Admin Login -->
    <div class="admin-login" id="adminLogin">
        <div class="login-box">
            <div class="login-title">Admin Girişi</div>
            <form onsubmit="checkAdmin(event)">
                <div class="form-group">
                    <input type="password" class="form-input" id="adminPass" placeholder="Şifre girin" style="text-align: center;" required>
                </div>
                <button type="submit" class="submit-btn">Giriş Yap</button>
                <button type="button" onclick="closeAdminLogin()" style="margin-top: 15px; background: transparent; border: 2px solid #ddd; color: #666; padding: 15px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: 600;">İptal</button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <div class="admin-title">DAWİNSAR Mesajlar</div>
            <button class="admin-close" onclick="closeAdminPanel()">Kapat</button>
        </div>
        <div class="messages-container" id="messagesContainer"></div>
    </div>

    <!-- Admin Link -->
    <a href="#" class="admin-link" onclick="openAdminLogin(); return false;">Yönetim</a>

    <script>
        // Konfeti oluştur
        const confettiContainer = document.getElementById('confetti-container');
        const colors = ['#ff0844', '#ffd700', '#fff', '#ff6b6b', '#ffa500'];
        
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 5 + 5) + 's';
            confetti.style.animationDelay = Math.random() * 5 + 's';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
            confettiContainer.appendChild(confetti);
        }

        // Modal fonksiyonları
        function openModal() {
            document.getElementById('modal').classList.add('active');
            document.getElementById('formContainer').style.display = 'block';
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('fullName').value = '';
            document.getElementById('message').value = '';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Form gönderimi
        function submitForm(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const message = document.getElementById('message').value;
            const date = new Date().toLocaleString('tr-TR');
            
            let messages = JSON.parse(localStorage.getItem('dawinsarMessages') || '[]');
            messages.push({
                id: Date.now(),
                name: name,
                message: message,
                date: date
            });
            localStorage.setItem('dawinsarMessages', JSON.stringify(messages));
            
            document.getElementById('formContainer').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            
            setTimeout(() => {
                closeModal();
            }, 2500);
        }

        // Admin fonksiyonları
        function openAdminLogin() {
            document.getElementById('adminLogin').classList.add('active');
        }

        function closeAdminLogin() {
            document.getElementById('adminLogin').classList.remove('active');
        }

        function checkAdmin(e) {
            e.preventDefault();
            if (document.getElementById('adminPass').value === 'dawinsar2024') {
                closeAdminLogin();
                showAdminPanel();
            } else {
                alert('Hatalı şifre!');
            }
        }

        function showAdminPanel() {
            document.getElementById('adminPanel').classList.add('active');
            loadMessages();
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').classList.remove('active');
        }

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('dawinsarMessages') || '[]');
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 60px; font-size: 1.1rem;">Henüz mesaj yok</div>';
                return;
            }
            
            container.innerHTML = messages.reverse().map(msg => `
                <div class="message-card">
                    <div class="message-header">
                        <span class="message-name">${escapeHtml(msg.name)}</span>
                        <span class="message-date">${msg.date}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.message)}</div>
                    <button class="delete-btn" onclick="deleteMessage(${msg.id})">Sil</button>
                </div>
            `).join('') + '<button class="clear-all-btn" onclick="clearAll()">Tüm Mesajları Sil</button>';
        }

        function deleteMessage(id) {
            let messages = JSON.parse(localStorage.getItem('dawinsarMessages') || '[]');
            messages = messages.filter(m => m.id !== id);
            localStorage.setItem('dawinsarMessages', JSON.stringify(messages));
            loadMessages();
        }

        function clearAll() {
            if (confirm('Tüm mesajları silmek istediğinize emin misiniz?')) {
                localStorage.removeItem('dawinsarMessages');
                loadMessages();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Modal dışına tıklama
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
